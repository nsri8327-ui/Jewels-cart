<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elegant Sparkles | Jewelry Sale</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f9f5f0;
            color: #333;
        }

        header {
            background: #111;
            color: gold;
            padding: 20px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            background: #222;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: gold;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338') no-repeat center center/cover;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            background: rgba(0,0,0,0.6);
            padding: 20px;
        }

        .products {
            padding: 50px 10%;
            text-align: center;
        }

        .products h2 {
            margin-bottom: 30px;
            color: #b8860b;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-10px);
        }

        .product-card img {
            width: 100%;
            border-radius: 10px;
        }

        .product-card h3 {
            margin: 15px 0 10px;
        }

        .price {
            color: #b8860b;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .btn {
            background: gold;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn:hover {
            background: #b8860b;
            color: white;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        @media(max-width: 768px){
            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>💎 Elegant Sparkles</h1>
    <p>Luxury Jewelry Sale</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#products">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h1>Exclusive Jewelry Sale – Up to 40% Off</h1>
</section>

<section class="products" id="products">
    <h2>Featured Collection</h2>

    <div class="product-grid">

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1602751584552-8ba73aad10e1" alt="Gold Necklace">
            <h3>Gold Necklace</h3>
            <p class="price">₹4,999</p>
            <button class="btn">Buy Now</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1588449668365-d15e397f6787" alt="Diamond Ring">
            <h3>Diamond Ring</h3>
            <p class="price">₹9,999</p>
            <button class="btn">Buy Now</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1599643477877-530eb83abc8e" alt="Silver Earrings">
            <h3>Silver Earrings</h3>
            <p class="price">₹2,499</p>
            <button class="btn">Buy Now</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Elegant Sparkles | Designed for Jewelry Business</p>
</footer>

</body>
</html>
